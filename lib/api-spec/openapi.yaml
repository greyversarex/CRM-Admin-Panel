openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Music Distribution CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: artists
    description: Artist management
  - name: labels
    description: Label management
  - name: releases
    description: Release management
  - name: tracks
    description: Track management
  - name: users
    description: User management
  - name: crm-contacts
    description: CRM contacts
  - name: crm-tasks
    description: CRM tasks
  - name: finance
    description: Financial management
  - name: splits
    description: Revenue splits
  - name: payouts
    description: Payout management
  - name: publishing
    description: Publishing works
  - name: analytics
    description: Analytics and reporting
  - name: delivery
    description: DDEX delivery
  - name: dashboard
    description: Dashboard summaries
  - name: assets
    description: File uploads (covers, audio) backed by object storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ==================== DASHBOARD ====================
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/top-artists:
    get:
      operationId: getDashboardTopArtists
      tags: [dashboard]
      summary: Get top artists by streams
      responses:
        "200":
          description: Top artists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopArtist"

  /dashboard/revenue-by-month:
    get:
      operationId: getDashboardRevenueByMonth
      tags: [dashboard]
      summary: Get revenue by month
      responses:
        "200":
          description: Revenue by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueByMonth"

  /dashboard/releases-by-status:
    get:
      operationId: getDashboardReleasesByStatus
      tags: [dashboard]
      summary: Get releases count by status
      responses:
        "200":
          description: Releases by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  # ==================== ARTISTS ====================
  /artists:
    get:
      operationId: listArtists
      tags: [artists]
      summary: List all artists
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: genre
          in: query
          schema:
            type: string
        - name: label_id
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of artists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedArtists"
    post:
      operationId: createArtist
      tags: [artists]
      summary: Create a new artist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtistBody"
      responses:
        "201":
          description: Artist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"

  /artists/{id}:
    get:
      operationId: getArtist
      tags: [artists]
      summary: Get artist by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artist details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistDetail"
    put:
      operationId: updateArtist
      tags: [artists]
      summary: Update artist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtistBody"
      responses:
        "200":
          description: Artist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
    delete:
      operationId: deleteArtist
      tags: [artists]
      summary: Delete artist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Artist deleted

  /artists/{id}/stats:
    get:
      operationId: getArtistStats
      tags: [artists]
      summary: Get artist analytics stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artist stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistStats"

  # ==================== LABELS ====================
  /labels:
    get:
      operationId: listLabels
      tags: [labels]
      summary: List all labels
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of labels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedLabels"
    post:
      operationId: createLabel
      tags: [labels]
      summary: Create a new label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelBody"
      responses:
        "201":
          description: Label created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"

  /labels/{id}:
    get:
      operationId: getLabel
      tags: [labels]
      summary: Get label by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Label details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
    put:
      operationId: updateLabel
      tags: [labels]
      summary: Update label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelBody"
      responses:
        "200":
          description: Label updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
    delete:
      operationId: deleteLabel
      tags: [labels]
      summary: Delete label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Label deleted

  # ==================== RELEASES ====================
  /releases:
    get:
      operationId: listReleases
      tags: [releases]
      summary: List all releases
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_review, approved, delivering, delivered, live, error, takedown_requested, removed]
        - name: artist_id
          in: query
          schema:
            type: integer
        - name: label_id
          in: query
          schema:
            type: integer
        - name: release_type
          in: query
          schema:
            type: string
            enum: [single, album, ep, compilation]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of releases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReleases"
    post:
      operationId: createRelease
      tags: [releases]
      summary: Create a new release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseBody"
      responses:
        "201":
          description: Release created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /releases/{id}:
    get:
      operationId: getRelease
      tags: [releases]
      summary: Get release by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDetail"
    put:
      operationId: updateRelease
      tags: [releases]
      summary: Update release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseBody"
      responses:
        "200":
          description: Release updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
    delete:
      operationId: deleteRelease
      tags: [releases]
      summary: Delete release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Release deleted

  /releases/{id}/status:
    patch:
      operationId: updateReleaseStatus
      tags: [releases]
      summary: Update release status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReleaseStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /releases/import-upc:
    post:
      operationId: importReleaseByUpc
      tags: [releases]
      summary: Import release metadata by UPC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportByUpcBody"
      responses:
        "200":
          description: Release metadata fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /releases/counts:
    get:
      operationId: getReleaseCounts
      tags: [releases]
      summary: Get release counts grouped by status
      responses:
        "200":
          description: Status counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseCounts"

  /releases/transfer-imports:
    get:
      operationId: listTransferImports
      tags: [releases]
      summary: List transfer-track import jobs
      responses:
        "200":
          description: List of import jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransferImport"
    post:
      operationId: createTransferImport
      tags: [releases]
      summary: Create a transfer-track import from selected Spotify releases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferImportBody"
      responses:
        "201":
          description: Import created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferImport"

  /releases/transfer-imports/spotify-search:
    get:
      operationId: spotifySearchReleases
      tags: [releases]
      summary: Search releases for a Spotify artist link or UPC
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spotify search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifySearchResult"

  # ==================== TRACKS ====================
  /tracks:
    get:
      operationId: listTracks
      tags: [tracks]
      summary: List all tracks
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: release_id
          in: query
          schema:
            type: integer
        - name: artist_id
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTracks"
    post:
      operationId: createTrack
      tags: [tracks]
      summary: Create a new track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrackBody"
      responses:
        "201":
          description: Track created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"

  /tracks/{id}:
    get:
      operationId: getTrack
      tags: [tracks]
      summary: Get track by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Track details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
    put:
      operationId: updateTrack
      tags: [tracks]
      summary: Update track
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrackBody"
      responses:
        "200":
          description: Track updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
    delete:
      operationId: deleteTrack
      tags: [tracks]
      summary: Delete track
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Track deleted

  # ==================== USERS ====================
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, label, artist, manager]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted

  # ==================== CRM CONTACTS ====================
  /crm/contacts:
    get:
      operationId: listContacts
      tags: [crm-contacts]
      summary: List CRM contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [artist, author, label, manager, partner]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedContacts"
    post:
      operationId: createContact
      tags: [crm-contacts]
      summary: Create CRM contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /crm/contacts/{id}:
    get:
      operationId: getContact
      tags: [crm-contacts]
      summary: Get contact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    put:
      operationId: updateContact
      tags: [crm-contacts]
      summary: Update contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [crm-contacts]
      summary: Delete contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Contact deleted

  # ==================== CRM TASKS ====================
  /crm/tasks:
    get:
      operationId: listTasks
      tags: [crm-tasks]
      summary: List CRM tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [todo, in_progress, done, cancelled]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: assigned_to
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCrmTasks"
    post:
      operationId: createCrmTask
      tags: [crm-tasks]
      summary: Create CRM task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrmTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmTask"

  /crm/tasks/{id}:
    get:
      operationId: getCrmTask
      tags: [crm-tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmTask"
    put:
      operationId: updateCrmTask
      tags: [crm-tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrmTaskBody"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmTask"
    delete:
      operationId: deleteCrmTask
      tags: [crm-tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Task deleted

  # ==================== FINANCE / TRANSACTIONS ====================
  /finance/transactions:
    get:
      operationId: listTransactions
      tags: [finance]
      summary: List financial transactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [dsp_revenue, publishing_revenue, content_id, manual, payout]
        - name: artist_id
          in: query
          schema:
            type: integer
        - name: label_id
          in: query
          schema:
            type: integer
        - name: currency
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTransactions"
    post:
      operationId: createTransaction
      tags: [finance]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /finance/balances:
    get:
      operationId: listBalances
      tags: [finance]
      summary: Get balances for all artists/labels
      responses:
        "200":
          description: Balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"

  # ==================== ROYALTIES ====================
  /royalties/summary:
    get:
      operationId: getRoyaltySummary
      tags: [royalties]
      summary: Aggregated royalty summary for the requesting entity (or whole catalog for admin/manager)
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
            enum: [artist, label]
        - name: entity_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Royalty summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoyaltySummary"

  /royalties/statements:
    get:
      operationId: listRoyaltyStatements
      tags: [royalties]
      summary: Monthly statements (downloadable PDF/CSV)
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
            enum: [artist, label]
        - name: entity_id
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Statements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoyaltyStatement"

  /royalties/by-release:
    get:
      operationId: listRoyaltyByRelease
      tags: [royalties]
      summary: Earnings broken down by release
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
            enum: [artist, label]
        - name: entity_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
