components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ==================== COMMON ====================
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]

    # ==================== DASHBOARD ====================
    DashboardSummary:
      type: object
      properties:
        totalArtists:
          type: integer
        totalReleases:
          type: integer
        totalTracks:
          type: integer
        totalRevenue:
          type: number
        pendingPayouts:
          type: integer
        activeDeliveries:
          type: integer
        revenueGrowth:
          type: number
        releasesThisMonth:
          type: integer
      required: [totalArtists, totalReleases, totalTracks, totalRevenue, pendingPayouts, activeDeliveries, revenueGrowth, releasesThisMonth]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        description:
          type: string
        timestamp:
          type: string
        entityType:
          type: string
        entityId:
          type: integer
      required: [id, type, title, description, timestamp, entityType, entityId]

    TopArtist:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
        totalStreams:
          type: integer
        revenue:
          type: number
        trend:
          type: number
      required: [id, name, totalStreams, revenue, trend]

    RevenueByMonth:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
        dspRevenue:
          type: number
        publishingRevenue:
          type: number
      required: [month, revenue, dspRevenue, publishingRevenue]

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required: [status, count]

    # ==================== ARTISTS ====================
    Artist:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        labelId:
          type: integer
          nullable: true
        labelName:
          type: string
          nullable: true
        spotifyId:
          type: string
          nullable: true
        appleId:
          type: string
          nullable: true
        socialLinks:
          type: object
          nullable: true
        status:
          type: string
        totalReleases:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, slug, status, totalReleases, createdAt, updatedAt]

    ArtistDetail:
      allOf:
        - $ref: "#/components/schemas/Artist"
        - type: object
          properties:
            releases:
              type: array
              items:
                $ref: "#/components/schemas/Release"
            recentTracks:
              type: array
              items:
                $ref: "#/components/schemas/Track"

    ArtistStats:
      type: object
      properties:
        totalStreams:
          type: integer
        totalRevenue:
          type: number
        monthlyListeners:
          type: integer
        topPlatform:
          type: string
        streamsByPlatform:
          type: array
          items:
            $ref: "#/components/schemas/PlatformAnalytics"
      required: [totalStreams, totalRevenue, monthlyListeners, topPlatform, streamsByPlatform]

    CreateArtistBody:
      type: object
      properties:
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        labelId:
          type: integer
          nullable: true
        spotifyId:
          type: string
          nullable: true
        appleId:
          type: string
          nullable: true
        socialLinks:
          type: object
          nullable: true
        status:
          type: string
          enum: [active, inactive]
          default: active
      required: [name]

    PaginatedArtists:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Artist"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ==================== LABELS ====================
    Label:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        parentLabelId:
          type: integer
          nullable: true
        parentLabelName:
          type: string
          nullable: true
        status:
          type: string
        totalArtists:
          type: integer
        totalReleases:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, status, totalArtists, totalReleases, createdAt, updatedAt]

    CreateLabelBody:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        parentLabelId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, inactive]
          default: active
      required: [name]

    PaginatedLabels:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ==================== RELEASES ====================
    Release:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        releaseType:
          type: string
          enum: [single, album, ep, compilation]
        status:
          type: string
          enum: [draft, pending_review, approved, delivering, delivered, live, error, takedown_requested, removed]
        upc:
          type: string
          nullable: true
        artistId:
          type: integer
        artistName:
          type: string
        labelId:
          type: integer
          nullable: true
        labelName:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        releaseDate:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        isExplicit:
          type: boolean
        territories:
          type: array
          items:
            type: string
        totalTracks:
          type: integer
        pLine:
          type: string
          nullable: true
        cLine:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, releaseType, status, artistId, artistName, isExplicit, territories, totalTracks, createdAt, updatedAt]

    ReleaseDetail:
      allOf:
        - $ref: "#/components/schemas/Release"
        - type: object
          properties:
            tracks:
              type: array
              items:
                $ref: "#/components/schemas/Track"

    CreateReleaseBody:
      type: object
      properties:
        title:
          type: string
        releaseType:
          type: string
          enum: [single, album, ep, compilation]
        artistId:
          type: integer
        labelId:
          type: integer
          nullable: true
        upc:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        releaseDate:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        isExplicit:
          type: boolean
          default: false
        territories:
          type: array
          items:
            type: string
          default: ["WW"]
        pLine:
          type: string
          nullable: true
        cLine:
          type: string
          nullable: true
      required: [title, releaseType, artistId]

    UpdateReleaseStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, pending_review, approved, delivering, delivered, live, error, takedown_requested, removed]
        note:
          type: string
          nullable: true
      required: [status]

    ImportByUpcBody:
      type: object
      properties:
        upc:
          type: string
        source:
          type: string
          enum: [spotify, apple, musicbrainz]
          default: spotify
      required: [upc]

    ReleaseCounts:
      type: object
      properties:
        all:
          type: integer
        draft:
          type: integer
        pending_review:
          type: integer
        approved:
          type: integer
        scheduled:
          type: integer
        live:
          type: integer
        takedown:
          type: integer
        unfinished:
          type: integer
        readyToSubmit:
          type: integer
      required: [all, draft, pending_review, approved, scheduled, live, takedown, unfinished, readyToSubmit]

    TransferImport:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [in_progress, complete, error]
        spotifyArtistId:
          type: string
          nullable: true
        spotifyArtistName:
          type: string
          nullable: true
        importedCount:
          type: integer
        failedCount:
          type: integer
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TransferImportItem"
      required: [id, status, importedCount, failedCount, createdAt, items]

    TransferImportItem:
      type: object
      properties:
        upc:
          type: string
        title:
          type: string
        artist:
          type: string
        label:
          type: string
          nullable: true
        tracks:
          type: integer
        coverUrl:
          type: string
          nullable: true
        success:
          type: boolean
      required: [upc, title, artist, tracks, success]

    CreateTransferImportBody:
      type: object
      properties:
        spotifyArtistId:
          type: string
        spotifyArtistName:
          type: string
        labelName:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/TransferImportItem"
      required: [spotifyArtistId, items]

    SpotifySearchResult:
      type: object
      properties:
        artistId:
          type: string
        artistName:
          type: string
        artistImage:
          type: string
          nullable: true
        releases:
          type: array
          items:
            $ref: "#/components/schemas/SpotifyReleaseResult"
      required: [artistId, artistName, releases]

    SpotifyReleaseResult:
      type: object
      properties:
        upc:
          type: string
        title:
          type: string
        artist:
          type: string
        label:
          type: string
          nullable: true
        tracks:
          type: integer
        coverUrl:
          type: string
          nullable: true
        releaseDate:
          type: string
          nullable: true
      required: [upc, title, artist, tracks]

    PaginatedReleases:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Release"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ==================== TRACKS ====================
    Track:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        isrc:
          type: string
          nullable: true
        releaseId:
          type: integer
          nullable: true
        releaseName:
          type: string
          nullable: true
        artistId:
          type: integer
        artistName:
          type: string
        trackNumber:
          type: integer
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        genre:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        isExplicit:
          type: boolean
        composerName:
          type: string
          nullable: true
        lyricistName:
          type: string
