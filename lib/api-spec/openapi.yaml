        filename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        sha256: { type: string, nullable: true }
        durationSeconds: { type: integer, nullable: true }
        releaseId: { type: integer, nullable: true }
        trackId: { type: integer, nullable: true }
        artistId: { type: integer, nullable: true }
        labelId: { type: integer, nullable: true }
        uploadedBy: { type: integer, nullable: true }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, kind, objectPath, filename, mimeType, sizeBytes, createdAt, updatedAt]

    AssetWithDownload:
      allOf:
        - $ref: "#/components/schemas/Asset"
        - type: object
          properties:
            downloadUrl:
              type: string
              description: Short-lived signed GET URL (TTL ~5 minutes)
          required: [downloadUrl]

    PresignAssetBody:
      type: object
      properties:
        kind: { type: string, enum: [audio, cover, image, document] }
        filename: { type: string, minLength: 1, maxLength: 255 }
        mimeType: { type: string, minLength: 1, maxLength: 127 }
        sizeBytes: { type: integer, minimum: 1 }
        releaseId: { type: integer, nullable: true }
        trackId: { type: integer, nullable: true }
      required: [kind, filename, mimeType, sizeBytes]

    PresignAssetResponse:
      type: object
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }
        storageKey: { type: string }
        expiresAt: { type: string }
      required: [uploadURL, objectPath, storageKey, expiresAt]

    ConfirmAssetBody:
      type: object
      properties:
        storageKey: { type: string }
        objectPath: { type: string }
        kind: { type: string, enum: [audio, cover, image, document] }
        filename: { type: string, minLength: 1, maxLength: 255 }
        mimeType: { type: string, minLength: 1, maxLength: 127 }
        releaseId: { type: integer, nullable: true }
        trackId: { type: integer, nullable: true }
        attach:
          type: boolean
          description: If true, also writes the resulting URL to release.coverUrl / track.audioUrl.
          default: true
      required: [storageKey, objectPath, kind, filename, mimeType]
