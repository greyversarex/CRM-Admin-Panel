# ───────────────────────────────────────────────────────────
#  Tajik Music CRM — docker compose
#  Использование:
#    cp deploy/.env.example .env       # один раз
#    docker compose up -d --build
#    docker compose exec api pnpm --filter @workspace/db run push
#    docker compose exec api pnpm --filter @workspace/db run seed   # при первом запуске
# ───────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tajikmusic
      POSTGRES_USER: tajikmusic_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tajikmusic_user -d tajikmusic"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://tajikmusic_user:${POSTGRES_PASSWORD}@postgres:5432/tajikmusic
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      # Где хранить загруженные обложки/аудио/KYC. Совпадает с volume ниже.
      LOCAL_STORAGE_ROOT: /var/lib/tajikmusic/uploads
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # Чтобы nginx-контейнер мог отдавать статику
      - frontend_dist:/app/artifacts/crm-panel/dist
      # Загруженные файлы — на named volume, переживают пересборки и git pull
      - uploads:/var/lib/tajikmusic/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
  frontend_dist:
  uploads:
