# Nginx конфиг для docker-compose (контейнер `nginx` стоит перед `api`)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log /var/log/nginx/tajikmusic_access.log;
    error_log  /var/log/nginx/tajikmusic_error.log;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # 250M = audio до 200 МБ + запас. Меньше нельзя — иначе nginx обрежет
    # большие аудио и вернёт 413 ещё до того, как запрос дойдёт до Node.
    client_max_body_size 250M;
    client_body_timeout    300s;
    proxy_request_buffering off;

    # API → Node.js контейнер
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA — статика, собранная Vite в /app/artifacts/crm-panel/dist/public
    location / {
        root  /usr/share/nginx/html/public;
        index index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        try_files $uri $uri/ /index.html;
    }
}
