# ═══════════════════════════════════════════════════════
#  Nginx конфигурация — Tajik Music CRM
#  Куда скопировать:
#    cp /var/www/tajikmusic/deploy/nginx.conf /etc/nginx/sites-available/tajikmusic
#    ln -sf /etc/nginx/sites-available/tajikmusic /etc/nginx/sites-enabled/tajikmusic
#    rm -f /etc/nginx/sites-enabled/default
#    nginx -t && systemctl reload nginx
# ═══════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;

    # Замени на свой домен или IP:
    server_name your-domain.com www.your-domain.com;

    # Логи
    access_log /var/log/nginx/tajikmusic_access.log;
    error_log  /var/log/nginx/tajikmusic_error.log;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # ── API → Node.js ────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Статика фронтенда (React SPA) ───────────────────
    location / {
        root  /var/www/tajikmusic/artifacts/crm-panel/dist/public;
        index index.html;

        # Кешируем статические файлы агрессивно
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — всё остальное отдаём index.html
        try_files $uri $uri/ /index.html;
    }

    # Размер тела запроса (для загрузки файлов)
    client_max_body_size 50M;
}

